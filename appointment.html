<!-- ================= HERO ================= -->
<header class="position-relative">

<img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1600&q=80"
class="w-100" style="height:60vh; object-fit:cover;" alt="Hospital">

<div class="position-absolute top-50 start-50 translate-middle text-center text-white">

<h1 class="fw-bold display-4">Book Your Appointment</h1>
<p class="lead">Fast and easy scheduling with our doctors</p>

</div>

</header>

<!-- ================= APPOINTMENT FORM ================= -->
<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow border-0">

<div class="card-body p-4">

<h3 class="fw-bold mb-4 text-center">Appointment Form</h3>

<form id="appointmentForm">

<!-- NAME -->
<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="fullname" name="fullname" required>
</div>

<!-- EMAIL -->
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="email" name="email" required>
</div>

<!-- PHONE -->
<div class="mb-3">
<label class="form-label">Phone</label>
<input type="tel" class="form-control" id="phone" name="phone" required>
</div>

<!-- DEPARTMENT -->
<div class="mb-3">
<label class="form-label">Department</label>
<select class="form-select" id="department" name="department" required>
<option value="">Select Department</option>
<option>Cardiology</option>
<option>Pediatrics</option>
<option>Surgery</option>
<option>Neurology</option>
<option>Gynecology</option>
<option>Dermatology</option>
</select>
</div>

<!-- DATE -->
<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" class="form-control" id="date" name="date" required>
</div>

<!-- TIME -->
<div class="mb-3">
<label class="form-label">Time</label>
<input type="time" class="form-control" id="time" name="time" required>
</div>

<!-- BUTTON -->
<button type="submit" class="btn btn-success w-100">
Book Appointment
</button>

</form>

</div>
</div>

</div>

</div>

</div>

</section>
